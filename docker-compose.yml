version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env                      # 只在本地存在，不进 Git
    volumes:
      - kb_data:/app/data         # 持久化知识库，不进镜像
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  kb_data:
